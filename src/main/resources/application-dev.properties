spring.application.name=escuelas_project

spring.datasource.url=jdbc:postgresql://localhost:5430/escuelas_project
spring.datasource.username = admin_stock
spring.datasource.password = postgres
spring.jpa.show-sql = false
spring.jpa.open-in-view=false

spring.jpa.hibernate.ddl-auto = update
server.port= 3000

application.security.cors.allowed-origins=http://192.168.0.8:5173,http://localhost:5173

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.output.ansi.enabled=always

springdoc.swagger-ui.path=/swagger.html
springdoc.api-docs.enabled=true